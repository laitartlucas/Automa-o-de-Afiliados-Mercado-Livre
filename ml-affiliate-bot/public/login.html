<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ML Affiliate Bot — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 { font-size: 1.6rem; font-weight: 700; color: #fff; }
    .logo h1 span { color: #25d366; }
    .logo p { margin-top: 6px; font-size: 0.85rem; color: #555; }

    label { display: block; font-size: 0.82rem; color: #777; margin-bottom: 8px; font-weight: 500; }

    input[type="password"] {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 13px 16px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus { border-color: #25d366; }

    button {
      width: 100%;
      margin-top: 20px;
      background: #25d366;
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:hover:not(:disabled) { background: #1ebe5a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: #ef444415;
      border: 1px solid #ef444430;
      border-radius: 8px;
      font-size: 0.83rem;
      color: #f87171;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>ML <span>Affiliate</span> Bot</h1>
      <p>Entre com sua senha para continuar</p>
    </div>

    <label for="password">Senha</label>
    <input type="password" id="password" placeholder="••••••••" autofocus />
    <button id="btn">Entrar</button>
    <div class="error" id="error">Senha incorreta. Tente novamente.</div>
  </div>

  <script>
    const btn = document.getElementById('btn');
    const input = document.getElementById('password');
    const error = document.getElementById('error');

    async function login() {
      const password = input.value.trim();
      if (!password) return;

      btn.disabled = true;
      btn.textContent = 'Entrando...';
      error.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          error.style.display = 'block';
          input.value = '';
          input.focus();
        }
      } catch {
        error.textContent = 'Erro de conexão com o servidor.';
        error.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    btn.addEventListener('click', login);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
